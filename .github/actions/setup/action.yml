---
name: Set up Gradle build environment
description: |
  Checkout the repository (full history), install the requested JDK(s), set up
  uv, and configure Gradle with optional Develocity access. Designed to be the
  first step a Gradle-based job takes; the build / publish composite actions
  in this repo assume this has run.

inputs:
  java_version:
    description: Java version(s) to install (passed verbatim to actions/setup-java).
    required: false
    default: '21'
  develocity_access_key:
    description: Develocity / Gradle Enterprise access key, if any.
    required: false
    default: ''
  sonatype_username:
    description: |
      Sonatype Central username. When set together with sonatype_token, ~/.m2/settings.xml
      is written so that code under test which honors Maven settings (e.g. rewrite-maven's
      MavenPomDownloader) authenticates to Maven Central. Resolved by rewrite at test time
      from the SONATYPE_USERNAME / SONATYPE_TOKEN environment variables, so callers must
      also expose those to the step that runs the tests.
    required: false
    default: ''
  sonatype_token:
    description: Sonatype Central token. See sonatype_username.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        show-progress: false

    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java_version }}

    - uses: astral-sh/setup-uv@v7

    - uses: gradle/actions/setup-gradle@v5
      with:
        develocity-access-key: ${{ inputs.develocity_access_key }}

    - name: Write ~/.m2/settings.xml for authenticated Maven Central
      if: inputs.sonatype_username != '' && inputs.sonatype_token != ''
      shell: bash
      run: |
        mkdir -p ~/.m2
        umask 077
        cat > ~/.m2/settings.xml <<'XML'
        <settings>
          <servers>
            <server>
              <id>central</id>
              <username>${env.SONATYPE_USERNAME}</username>
              <password>${env.SONATYPE_TOKEN}</password>
            </server>
          </servers>
        </settings>
        XML
